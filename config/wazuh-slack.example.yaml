# Full production-shape example for the wazuh-slack connector.
# Tokens come from environment variables for safety.

slack:
  token_bot:  "${SLACK_BOT_TOKEN}"   # xoxb-... (Events API + Web API)
  token_user: "${SLACK_USER_TOKEN}"  # xoxp-... (Audit Logs — Enterprise Grid only)
  token_app:  "${SLACK_APP_TOKEN}"   # xapp-... (Socket Mode)
  org_id:     "E0AN66GDRRU"            # required for audit
  sources:
    audit:         { enabled: true,  poll_seconds: 60 }
    events:        { enabled: true,  mode: socket }
    access_logs:   { enabled: false, poll_seconds: 300 }
    web_inventory: { enabled: true,  poll_seconds: 3600 }

filters:
  drop:
    - field: slack.action
      in: [user_login_failed_unknown_user]
    - field: slack.actor.email
      regex_match: ".*@bot\\.local$"

  audit:
    allow:
      - field: slack.action
        in: [user_login, user_login_failed, app_installed, app_uninstalled,
             file_public_link_created, file_downloaded, role_change_to_admin,
             tokens_revoked, mfa_disabled, sso_disabled]

  events:
    allow:
      - field: slack.action
        in: [tokens_revoked, app_uninstalled, file_public, member_joined_channel,
             channel_created, subteam_created, team_join, file_shared]

severity_map:
  mfa_disabled:             critical
  sso_disabled:             critical
  role_change_to_admin:     high
  file_public_link_created: medium
  app_installed:            medium
  user_login_failed:        low

sink:
  kind: unix_socket
  path: /var/ossec/queue/sockets/queue
  spool:
    dir: /var/lib/wazuh-slack/spool
    max_mb: 500

state:
  sqlite_path: /var/lib/wazuh-slack/state.db

observability:
  prometheus_bind: "0.0.0.0:9183"   # GET /metrics
  health_bind:     "0.0.0.0:9184"   # GET /healthz -> 200 ok / 503 stale
  log_level: info
